version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 18
  - Vite
  - Tailwind CSS
  - Express backend API
routes:
  - path: /
    file: frontend/src/App.tsx
    auth_required: false
    description: Redirects to get-started view.
  - path: /get-started
    file: frontend/src/components/GetStarted.tsx
    auth_required: false
    description: Public landing page and lead capture form.
  - path: /login
    file: frontend/src/components/Login.tsx
    auth_required: false
    description: Role-based login page.
  - path: /student/:tab/:subTab?
    file: frontend/src/components/StudentDashboard.tsx
    auth_required: true
    description: Student dashboard with home, tests, profile, and question bank tabs.
  - path: /faculty/:section?
    file: frontend/src/components/FacultyDashboard.tsx
    auth_required: true
    description: Faculty dashboard and section navigation.
  - path: /admin/:section?
    file: frontend/src/components/AdminDashboard.tsx
    auth_required: true
    description: Admin dashboard and section navigation.
features:
  - name: Public Interest Form Submission
    description: Captures user enquiry submissions from the landing page.
    files:
      - frontend/src/components/GetStarted.tsx
      - frontend/src/api/landing.ts
    entry_route: /get-started
    user_interactions:
      - Fill name, email, phone, and course fields.
      - Submit the enquiry form.
      - View success or error feedback.
    api_calls:
      - method: POST
        endpoint: /api/queries
    auth_required: false
  - name: Role Based Authentication
    description: Logs in users and redirects by role to student, faculty, or admin areas.
    files:
      - frontend/src/components/Login.tsx
      - frontend/src/api/auth.ts
      - frontend/src/App.tsx
    entry_route: /login
    user_interactions:
      - Enter login credentials.
      - Submit the login form.
      - See inline error on invalid credentials.
      - Land on role-specific dashboard on success.
    api_calls:
      - method: POST
        endpoint: /api/auth/login
      - method: GET
        endpoint: /api/auth/me
      - method: POST
        endpoint: /api/auth/logout
    auth_required: false
  - name: Student Test Lifecycle
    description: Supports test list, attempt, autosave, submission, and analytics.
    files:
      - frontend/src/components/TestSeriesContainer.tsx
      - frontend/src/components/StudentTestTaking.tsx
      - frontend/src/components/StudentAnalytics.tsx
      - frontend/src/api/tests.ts
    entry_route: /student/test-series
    user_interactions:
      - Open assigned tests.
      - Start attempt and answer questions.
      - Save progress and submit final attempt.
      - Open analytics and history views.
    api_calls:
      - method: GET
        endpoint: /api/tests
      - method: GET
        endpoint: /api/tests/:id
      - method: POST
        endpoint: /api/tests/:id/progress
      - method: POST
        endpoint: /api/tests/:id/submit
    auth_required: true
known_limitations:
  - issue: Frontend routing and access checks are mostly role/state driven.
    location: frontend/src/App.tsx
    impact: Tests must establish role and session preconditions before route assertions.
