---
version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 18
  - Vite
  - Tailwind CSS
  - motion/react
  - Express backend API
routes:
  - path: /
    file: frontend/src/App.tsx
    auth_required: false
    description: Redirects to get-started flow.
  - path: /get-started
    file: frontend/src/components/GetStarted.tsx
    auth_required: false
    description: Public landing page and lead capture.
  - path: /login
    file: frontend/src/components/Login.tsx
    auth_required: false
    description: Credential login and role redirect.
  - path: /student/:tab/:subTab?
    file: frontend/src/components/StudentDashboard.tsx
    auth_required: true
    description: Student dashboard tabs for home, tests, profile, and question bank.
  - path: /faculty
    file: frontend/src/components/FacultyDashboard.tsx
    auth_required: true
    description: Faculty default dashboard section.
  - path: /faculty/:section
    file: frontend/src/components/FacultyDashboard.tsx
    auth_required: true
    description: Faculty landing sections such as batches and test series.
  - path: /faculty/:batchSlug/:tab
    file: frontend/src/components/FacultyDashboard.tsx
    auth_required: true
    description: Faculty batch-scoped dashboard tabs.
  - path: /admin
    file: frontend/src/components/AdminDashboard.tsx
    auth_required: true
    description: Admin default dashboard section.
  - path: /admin/:section
    file: frontend/src/components/AdminDashboard.tsx
    auth_required: true
    description: Admin landing sections such as batches, users, tests, and queries.
  - path: /admin/:batchSlug/:tab
    file: frontend/src/components/AdminDashboard.tsx
    auth_required: true
    description: Admin batch-scoped dashboard tabs.
features:
  - name: Public Interest Form Submission
    description: Captures prospect queries from the public landing page.
    files:
      - frontend/src/components/GetStarted.tsx
      - frontend/src/api/landing.ts
    entry_route: /get-started
    user_interactions:
      - Fill full name, email, phone, and course.
      - Submit the form.
      - View success or error feedback.
    api_calls:
      - method: POST
        endpoint: /api/queries
    auth_required: false
  - name: Role Based Authentication
    description: Logs in users and navigates to student/faculty/admin areas.
    files:
      - frontend/src/components/Login.tsx
      - frontend/src/api/auth.ts
      - frontend/src/App.tsx
    entry_route: /login
    user_interactions:
      - Enter login ID and password.
      - Submit login form.
      - See inline error on invalid credentials.
      - Land on role-specific dashboard on success.
    api_calls:
      - method: POST
        endpoint: /api/auth/login
      - method: GET
        endpoint: /api/auth/me
      - method: POST
        endpoint: /api/auth/logout
    auth_required: false
  - name: Student Learning Content
    description: Student navigates subjects, chapters, and notes.
    files:
      - frontend/src/components/student/StudentDashboardHome.tsx
      - frontend/src/components/NotesManagementTab.tsx
      - frontend/src/api/notes.ts
      - frontend/src/api/chapters.ts
      - frontend/src/api/subjects.ts
    entry_route: /student/home
    user_interactions:
      - Open a subject card.
      - Choose a chapter.
      - View or download study notes.
    api_calls:
      - method: GET
        endpoint: /api/subjects
      - method: GET
        endpoint: /api/chapters
      - method: GET
        endpoint: /api/notes
    auth_required: true
  - name: Student Test Lifecycle
    description: Supports test list, attempt, autosave, submit, and analytics.
    files:
      - frontend/src/components/TestSeriesContainer.tsx
      - frontend/src/components/StudentTestTaking.tsx
      - frontend/src/components/StudentAnalytics.tsx
      - frontend/src/api/tests.ts
    entry_route: /student/test-series
    user_interactions:
      - Choose an assigned test.
      - Start attempt and answer questions.
      - Save progress and submit final attempt.
      - Open analytics and history views.
    api_calls:
      - method: GET
        endpoint: /api/tests
      - method: GET
        endpoint: /api/tests/:id
      - method: POST
        endpoint: /api/tests/:id/progress
      - method: POST
        endpoint: /api/tests/:id/submit
    auth_required: true
  - name: Question Bank Browse
    description: Browse, search, sort, open, and download mapped files.
    files:
      - frontend/src/components/QuestionBank.tsx
      - frontend/src/api/questionBank.ts
    entry_route: /student/question-bank
    user_interactions:
      - Open question bank.
      - Search by title and sort results.
      - Open file preview or download.
    api_calls:
      - method: GET
        endpoint: /api/question-bank
    auth_required: true
  - name: Profile and Settings
    description: Handles avatar changes, password updates, and logout.
    files:
      - frontend/src/components/StudentProfile.tsx
      - frontend/src/components/FacultyProfile.tsx
      - frontend/src/components/AdminProfile.tsx
      - frontend/src/api/auth.ts
    entry_route: /student/profile
    user_interactions:
      - Open overview, performance, and settings tabs.
      - Update avatar image.
      - Change password with current-password validation.
      - Logout from the session.
    api_calls:
      - method: GET
        endpoint: /api/auth/me
      - method: POST
        endpoint: /api/auth/change-password
      - method: POST
        endpoint: /api/auth/logout
    auth_required: true
known_limitations:
  - issue: DPP creation/persistence is partially UI-driven in current implementation.
    location: frontend/src/components/CreateDPP.tsx
    impact: Some DPP flows may not have complete backend persistence assertions.
  - issue: Frontend route handling is custom and stateful.
    location: frontend/src/App.tsx
    impact: Tests must enforce role and route preconditions before assertions.
---
version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 18
  - Vite
  - Tailwind CSS
  - Express backend API
routes:
  - path: /get-started
    file: frontend/src/components/GetStarted.tsx
    auth_required: false
    description: Public landing and interest form page.
  - path: /login
    file: frontend/src/components/Login.tsx
    auth_required: false
    description: Role-based login page.
  - path: /student/home
    file: frontend/src/components/StudentDashboard.tsx
    auth_required: true
    description: Student dashboard home and quick actions.
  - path: /student/test-series
    file: frontend/src/components/TestSeriesContainer.tsx
    auth_required: true
    description: Student test list, attempts, analytics, and history.
  - path: /student/question-bank
    file: frontend/src/components/QuestionBank.tsx
    auth_required: true
    description: Student question bank browse/search/sort/download.
  - path: /student/profile
    file: frontend/src/components/StudentProfile.tsx
    auth_required: true
    description: Student overview, performance, and settings.
  - path: /faculty
    file: frontend/src/components/FacultyDashboard.tsx
    auth_required: true
    description: Faculty landing with section navigation.
  - path: /faculty/:batchSlug/:tab
    file: frontend/src/components/FacultyDashboard.tsx
    auth_required: true
    description: Faculty batch-context workflows.
  - path: /admin
    file: frontend/src/components/AdminDashboard.tsx
    auth_required: true
    description: Admin landing with section navigation.
  - path: /admin/:batchSlug/:tab
    file: frontend/src/components/AdminDashboard.tsx
    auth_required: true
    description: Admin batch-context workflows.
features:
  - name: Public Interest Form Submission
    description: Captures lead queries from public landing page.
    files:
      - frontend/src/components/GetStarted.tsx
      - frontend/src/api/landing.ts
    entry_route: /get-started
    user_interactions:
      - Fill full name, email, phone, and course.
      - Submit interest form.
      - View success or error toast/alert.
    api_calls:
      - method: POST
        endpoint: /api/queries
    auth_required: false
  - name: Role Based Authentication
    description: Logs in users and routes them to student/faculty/admin areas.
    files:
      - frontend/src/components/Login.tsx
      - frontend/src/api/auth.ts
      - frontend/src/App.tsx
    entry_route: /login
    user_interactions:
      - Enter login ID and password.
      - Click login button.
      - Observe inline error on invalid credentials.
      - Redirect to role-specific dashboard on success.
    api_calls:
      - method: POST
        endpoint: /api/auth/login
      - method: GET
        endpoint: /api/auth/me
      - method: POST
        endpoint: /api/auth/refresh
    auth_required: false
  - name: Student Notes and Batch Content
    description: Lets students browse chapters and view/download notes.
    files:
      - frontend/src/components/student/StudentDashboardHome.tsx
      - frontend/src/components/NotesManagementTab.tsx
      - frontend/src/api/notes.ts
      - frontend/src/api/chapters.ts
    entry_route: /student/home
    user_interactions:
      - Open a subject card.
      - Select chapter and content tab.
      - View note inline or download file.
    api_calls:
      - method: GET
        endpoint: /api/subjects
      - method: GET
        endpoint: /api/chapters
      - method: GET
        endpoint: /api/notes
    auth_required: true
  - name: Student Test Lifecycle
    description: Supports test discovery, attempt, autosave, submission, and analytics.
    files:
      - frontend/src/components/TestSeriesContainer.tsx
      - frontend/src/components/StudentTestTaking.tsx
      - frontend/src/components/StudentAnalytics.tsx
      - frontend/src/api/tests.ts
    entry_route: /student/test-series
    user_interactions:
      - Select assigned test from list.
      - Start attempt and answer questions.
      - Save progress continuously and submit final attempt.
      - Open analytics and past results.
    api_calls:
      - method: GET
        endpoint: /api/tests
      - method: POST
        endpoint: /api/tests/:id/attempts
      - method: POST
        endpoint: /api/tests/:id/progress
      - method: POST
        endpoint: /api/tests/:id/submit
    auth_required: true
  - name: Question Bank Search and Downloads
    description: Lets students and faculty/admin consume mapped resources.
    files:
      - frontend/src/components/QuestionBank.tsx
      - frontend/src/api/questionBank.ts
    entry_route: /student/question-bank
    user_interactions:
      - Open question bank.
      - Search by title and sort by configured criteria.
      - Open or download a file card.
    api_calls:
      - method: GET
        endpoint: /api/question-bank
    auth_required: true
  - name: Profile and Account Settings
    description: Supports avatar updates, password changes, and logout.
    files:
      - frontend/src/components/StudentProfile.tsx
      - frontend/src/components/FacultyProfile.tsx
      - frontend/src/components/AdminProfile.tsx
      - frontend/src/api/auth.ts
    entry_route: /student/profile
    user_interactions:
      - Open profile overview/performance/settings.
      - Upload or change avatar image.
      - Change password with current password validation.
      - Logout and return to public/login route.
    api_calls:
      - method: GET
        endpoint: /api/auth/me
      - method: POST
        endpoint: /api/auth/change-password
      - method: POST
        endpoint: /api/auth/logout
    auth_required: true
known_limitations:
  - issue: DPP workflow is partially UI-driven and may be placeholder in some roles.
    location: frontend/src/components/CreateDPP.tsx
    impact: End-to-end persistence checks can be limited for DPP features.
  - issue: Frontend uses many lazy-loaded and role-conditional views.
    location: frontend/src/App.tsx
    impact: Tests must ensure login role and route preconditions before assertions.
---
version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 18
  - Vite
  - Tailwind CSS
  - motion/react
  - lucide-react
routes:
  - path: /
    file: frontend/src/App.tsx
    auth_required: false
    description: Redirects to get-started view
  - path: /get-started
    file: frontend/src/App.tsx
    auth_required: false
    description: Marketing and onboarding entry page
  - path: /login
    file: frontend/src/App.tsx
    auth_required: false
    description: Credential login page
  - path: /student/:tab/:subTab?
    file: frontend/src/App.tsx
    auth_required: true
    description: Student dashboard tabs and nested subtabs
  - path: /faculty
    file: frontend/src/App.tsx
    auth_required: true
    description: Faculty default dashboard section
  - path: /faculty/:section
    file: frontend/src/App.tsx
    auth_required: true
    description: Faculty landing sections such as batches, students, test-series
  - path: /faculty/:batchSlug/:tab
    file: frontend/src/App.tsx
    auth_required: true
    description: Faculty batch-scoped dashboard tab
  - path: /admin
    file: frontend/src/App.tsx
    auth_required: true
    description: Admin default dashboard section
  - path: /admin/:section
    file: frontend/src/App.tsx
    auth_required: true
    description: Admin landing sections such as batches, students, faculty, queries
  - path: /admin/:batchSlug/:tab
    file: frontend/src/App.tsx
    auth_required: true
    description: Admin batch-scoped dashboard tab
features:
  - name: Authentication and Session Restore
    description: Supports login, logout, and profile restoration via token-based me endpoint
    files:
      - frontend/src/components/Login.tsx
      - frontend/src/App.tsx
      - frontend/src/api/auth.ts
    entry_route: /login
    user_interactions:
      - Enter user credentials and submit login form
      - Access role-specific dashboard after successful login
      - Logout to clear authenticated state
    api_calls:
      - method: POST
        endpoint: /auth/login
      - method: GET
        endpoint: /auth/me
      - method: POST
        endpoint: /auth/logout
    auth_required: false
  - name: Student Dashboard and Test Taking
    description: Students navigate tabs, attempt tests, review performance, and manage profile
    files:
      - frontend/src/components/StudentDashboard.tsx
      - frontend/src/components/StudentTestTaking.tsx
      - frontend/src/components/TestSeriesContainer.tsx
      - frontend/src/api/tests.ts
    entry_route: /student/home
    user_interactions:
      - Navigate between dashboard tabs (home, test-series, profile, question-bank)
      - Start and submit test attempts
      - Review analytics and rankings
    api_calls:
      - method: GET
        endpoint: /tests
      - method: GET
        endpoint: /tests/:id
      - method: POST
        endpoint: /tests/:id/attempts
      - method: POST
        endpoint: /tests/:id/submit
    auth_required: true
  - name: Admin Management Console
    description: Admin manages batches, students, faculties, landing content, and test lifecycle
    files:
      - frontend/src/components/AdminDashboard.tsx
      - frontend/src/App.tsx
      - frontend/src/api/batches.ts
      - frontend/src/api/students.ts
      - frontend/src/api/faculties.ts
      - frontend/src/api/landing.ts
      - frontend/src/api/tests.ts
    entry_route: /admin
    user_interactions:
      - Create, update, delete, and permanently delete batches
      - Create and manage student and faculty records
      - Create tests, save drafts, publish tests, force tests live, and preview tests
      - Edit landing content and triage user queries
    api_calls:
      - method: GET
        endpoint: /batches
      - method: POST
        endpoint: /batches
      - method: PATCH
        endpoint: /batches/:id
      - method: DELETE
        endpoint: /batches/:id
      - method: GET
        endpoint: /students
      - method: POST
        endpoint: /students
      - method: GET
        endpoint: /faculties
      - method: POST
        endpoint: /faculties
      - method: GET
        endpoint: /landing
      - method: PATCH
        endpoint: /landing
      - method: GET
        endpoint: /tests
      - method: POST
        endpoint: /tests
      - method: PATCH
        endpoint: /tests/:id
      - method: DELETE
        endpoint: /tests/:id
    auth_required: true
  - name: Faculty Batch Operations
    description: Faculty users handle batch-focused tasks, student reviews, and test operations
    files:
      - frontend/src/components/FacultyDashboard.tsx
      - frontend/src/App.tsx
      - frontend/src/api/students.ts
      - frontend/src/api/tests.ts
    entry_route: /faculty
    user_interactions:
      - Navigate section and batch-level views
      - Review and update student ratings
      - Preview and monitor published tests
    api_calls:
      - method: GET
        endpoint: /students
      - method: PATCH
        endpoint: /students/:id/rating
      - method: GET
        endpoint: /tests
      - method: GET
        endpoint: /tests/:id
    auth_required: true
  - name: Landing Page Lead Capture
    description: Public landing experience with course details and query submission flow
    files:
      - frontend/src/components/GetStarted.tsx
      - frontend/src/hooks/useLandingContent.ts
      - frontend/src/api/landing.ts
    entry_route: /get-started
    user_interactions:
      - Browse courses, faculty, achievers, and contact details
      - Submit enquiry form from landing page
    api_calls:
      - method: GET
        endpoint: /landing
      - method: POST
        endpoint: /landing/queries
    auth_required: false
known_limitations:
  - issue: Client-side routing is custom with window.history and not using a dedicated router library
    location: frontend/src/App.tsx
    impact: Deep-link behavior and route guards are hand-maintained and can regress during feature additions
  - issue: In dev mode only a limited subset of tests can run safely
    location: frontend/package.json
    impact: Test coverage is capped during development server execution
